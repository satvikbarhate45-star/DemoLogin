{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#2563eb,#7c3aed);
            overflow:hidden;
        }

        .circle{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.12);
            animation:float 6s infinite ease-in-out;
        }

        .c1{
            width:220px;
            height:220px;
            top:10%;
            left:10%;
        }

        .c2{
            width:280px;
            height:280px;
            bottom:10%;
            right:10%;
            animation-delay:2s;
        }

        .card{
            width:90%;
            max-width:400px;
            padding:40px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(15px);
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.3);
            animation:fadeUp 1s ease;
            z-index:1;
        }

        h2{
            color:#fff;
            text-align:center;
            margin-bottom:30px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:15px;
            border:none;
            outline:none;
            border-radius:12px;
            background:rgba(255,255,255,0.18);
            color:#fff;
            font-size:16px;
        }

        .input-box input::placeholder{
            color:#ddd;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#fff;
            color:#2563eb;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.4s;
        }

        button:hover{
            transform:translateY(-4px);
        }

        .link{
            text-align:center;
            margin-top:20px;
            color:#fff;
        }

        .link a{
            color:#fff;
            text-decoration:none;
            font-weight:bold;
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(50px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @keyframes float{
            50%{
                transform:translateY(-30px);
            }
        }

        @media(max-width:576px){
            .card{
                padding:30px 20px;
            }

            h2{
                font-size:28px;
            }

            .input-box input,
            button{
                padding:13px;
            }
        }
    </style>
</head>
<body>

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="card">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="input-box">
            <input type="email" name="email" placeholder="Email Address" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
    </div>
</div>

</body>
</html>
